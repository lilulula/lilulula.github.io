              <p>不知道怎么给自己贴标签，先留着～</p>
<ul>
<li>
<p>最开始的自救方法是「吃顿好的」、购物、看番看剧看书旅行。这些事会很让人短暂抽身，带来的愉悦也很直接。</p>
</li>
<li>
<p>然后是跑步、打扫卫生、做饭、亲手榨柠檬，这些身体力行的事，会唤醒手指和大脑以外的身体部位。</p>
</li>
<li>
<p>最后的方法是我正在做的事：写下来。</p>
</li>
</ul>
